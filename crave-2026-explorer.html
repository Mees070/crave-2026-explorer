<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>The Crave 2026 — Artist Explorer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap');
:root{
  --bg:#0a0a0a;--s1:#111;--s2:#181818;
  --b0:rgba(255,255,255,.06);--b1:rgba(255,255,255,.14);--b2:rgba(255,255,255,.28);
  --tx:#f0ede8;--mu:#777;--di:#3a3a3a;
  --cuboid:#7B6FE8;--sphere:#3DB88A;--tetra:#E8784A;--poly:#9E9E99;--pip:#D4992A;
  --player-h:88px;
  --top-chrome:132px;
  --yt:#ff3b30;
  --sc:#ff5500;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden;padding-bottom:var(--player-h)}

#topChrome{border-bottom:.5px solid var(--b0)}
.hdr{padding:1.1rem 2rem .65rem;display:flex;align-items:baseline;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.hdr-title{font-family:'Space Mono',monospace;font-size:17px;font-weight:700;letter-spacing:-.3px}
.hdr-sub{font-family:'Space Mono',monospace;font-size:10px;color:var(--mu);letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}

.story-ctx-inline{
  flex:1 1 8rem;min-width:0;margin-left:auto;padding-left:.5rem;
  font-size:9px;font-family:'Space Mono',monospace;color:var(--di);letter-spacing:.02em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:right;
}
.story-ctx-inline:empty{display:none}

.list-chapter{
  padding:5px 16px 3px;border-bottom:.5px solid var(--b0);
  position:sticky;top:0;z-index:2;background:var(--s1);
}
.list-chapter-name{font-size:9px;font-weight:500;color:var(--ch-c,#888);font-family:'Space Mono',monospace;letter-spacing:.06em;text-transform:uppercase}

.fbar{display:flex;gap:5px;padding:.85rem 2rem;border-bottom:.5px solid var(--b0);flex-wrap:wrap;align-items:center}
.flbl{font-size:10px;color:var(--di);letter-spacing:.1em;text-transform:uppercase;font-family:'Space Mono',monospace;margin-right:4px;flex-shrink:0}
.fb{font-size:11px;font-family:'Space Mono',monospace;padding:4px 12px;border-radius:2px;border:.5px solid var(--b1);background:transparent;color:var(--mu);cursor:pointer;transition:all .12s;letter-spacing:.03em;white-space:nowrap}
.fb:hover{color:var(--tx);border-color:var(--b2)}
.fb.on{font-weight:700;color:#080808}
[data-s=all].on{background:var(--tx);border-color:var(--tx)}
[data-s=cuboid].on{background:var(--cuboid);border-color:var(--cuboid)}
[data-s=sphere].on{background:var(--sphere);border-color:var(--sphere)}
[data-s=tetra].on{background:var(--tetra);border-color:var(--tetra)}
[data-s=poly].on{background:var(--poly);border-color:var(--poly);color:var(--tx)}
[data-s=pip].on{background:var(--pip);border-color:var(--pip)}

.sbar{padding:.6rem 2rem;border-bottom:.5px solid var(--b0);display:flex;flex-direction:column;gap:6px}
.sbar-main{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.sbar-q{font-size:11px;font-family:'DM Sans',sans-serif;padding:6px 10px;border-radius:2px;border:.5px solid var(--b1);background:var(--s1);color:var(--tx);min-width:120px;flex:1}
.sbar-q::placeholder{color:var(--di)}
.sbar-q:focus{outline:none;border-color:var(--b2)}
.sbar-count{font-size:9px;color:var(--di);font-family:'Space Mono',monospace;flex-shrink:0;white-space:nowrap}
.ctl{font-size:10px;font-family:'Space Mono',monospace;padding:5px 11px;border-radius:2px;border:.5px solid var(--b1);background:transparent;color:var(--mu);cursor:pointer;transition:all .12s;letter-spacing:.02em;white-space:nowrap}
.ctl:hover{color:var(--tx);border-color:var(--b2)}
.ctl.open{font-weight:700;color:#080808;background:var(--tx);border-color:var(--tx)}
.ctl.has-filt:not(.open){font-weight:700;color:var(--tx);border-color:var(--b2);background:rgba(255,255,255,.06)}
.dd-wrap{position:relative;flex-shrink:0}
.dd-menu{
  position:absolute;top:calc(100% + 4px);right:0;min-width:168px;z-index:50;
  background:var(--s1);border:.5px solid var(--b1);border-radius:3px;padding:4px;
  box-shadow:0 8px 28px rgba(0,0,0,.55);
}
.dd-menu[hidden]{display:none}
.dd-item{
  display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;
  font-size:10px;font-family:'Space Mono',monospace;padding:6px 10px;border-radius:2px;
  border:0;background:transparent;color:var(--mu);cursor:pointer;text-align:left;letter-spacing:.02em;
}
.dd-item:hover{color:var(--tx);background:var(--s2)}
.dd-item.on{color:var(--tx);font-weight:700}
.dd-item.on[data-sort="scf"],.dd-item.on[data-sort="scp"]{color:#ff9a5c}
.dd-arr{font-size:8px;opacity:.75}
.refine-panel{
  position:absolute;top:calc(100% + 4px);right:0;width:min(240px,calc(100vw - 2rem));z-index:50;
  background:var(--s1);border:.5px solid var(--b1);border-radius:3px;padding:.55rem .6rem;
  box-shadow:0 8px 28px rgba(0,0,0,.55);
  display:flex;flex-direction:column;gap:7px;
}
.refine-panel[hidden]{display:none}
.refine-chips{display:flex;gap:4px;flex-wrap:wrap}
.refine-select{
  width:100%;font-size:10px;font-family:'Space Mono',monospace;padding:5px 8px;border-radius:2px;
  border:.5px solid var(--b1);background:var(--s2);color:var(--tx);cursor:pointer;
}
.refine-select:focus{outline:none;border-color:var(--b2)}
.ft{font-size:10px;font-family:'Space Mono',monospace;padding:4px 9px;border-radius:2px;border:.5px solid var(--b1);background:transparent;color:var(--mu);cursor:pointer;transition:all .12s;letter-spacing:.02em;white-space:nowrap}
.ft:hover{color:var(--tx);border-color:var(--b2)}
.ft.on{font-weight:700;color:#080808}
.ft.on[data-t="hl"]{background:rgba(123,111,232,.85);border-color:rgba(123,111,232,.85)}
.ft.on[data-t="live"]{background:rgba(61,184,138,.85);border-color:rgba(61,184,138,.85)}
.ft.on[data-t="warm"]{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.35);color:var(--tx)}
.ft.on[data-t="local"]{background:rgba(212,153,42,.85);border-color:rgba(212,153,42,.85)}
.ft.on[data-t="sc"]{background:#ff5500;border-color:#ff5500}
.gf.on,.gx.on{font-weight:700;color:#080808;background:var(--tx);border-color:var(--tx)}
.chipbar{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.chipbar[hidden]{display:none}
.chip{
  font-size:9px;font-family:'Space Mono',monospace;padding:3px 8px;border-radius:2px;
  border:.5px solid var(--b1);background:var(--s2);color:var(--tx);cursor:pointer;letter-spacing:.02em;
}
.chip:hover{border-color:var(--b2)}
.chip-clear{font-size:9px;font-family:'Space Mono',monospace;padding:3px 7px;border:0;background:transparent;color:var(--mu);cursor:pointer;letter-spacing:.03em}
.chip-clear:hover{color:var(--tx)}
.ai-stat{font-size:9px;font-family:'Space Mono',monospace;flex-shrink:0;text-align:right;line-height:1.35;min-width:42px}
.ai-stat-val{display:block;font-weight:500}
.ai-stat-lbl{font-size:8px;color:var(--di);letter-spacing:.04em}

.layout{display:grid;grid-template-columns:300px 1fr;grid-template-rows:1fr;height:calc(100vh - var(--top-chrome) - var(--player-h))}
.col-list{grid-column:1;grid-row:1;border-right:.5px solid var(--b0);overflow-y:auto;min-height:0}
.col-detail{grid-column:2;grid-row:1;overflow-y:auto;padding:1.75rem 2rem 2rem;min-height:0}
.split-handle{display:none}

.ai{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:.5px solid var(--b0);cursor:pointer;transition:background .1s;border-left:3px solid transparent}
.ai:hover{background:var(--s2)}
.ai.on{background:var(--s2)}
.av,.dav,.plist img{width:34px;height:34px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--s2)}
.av,.dav{display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;letter-spacing:0}
.ai-info{flex:1;min-width:0}
.ai-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.ai-slot{font-size:9px;color:var(--mu);margin-top:2px;font-family:'Space Mono',monospace}
.ai-tags{display:flex;gap:3px;margin-top:4px;flex-wrap:wrap}
.t{font-size:9px;padding:1px 6px;border-radius:2px;font-family:'Space Mono',monospace;letter-spacing:.02em}
.tw{background:rgba(255,255,255,.04);color:var(--di);border:.5px solid var(--b0)}
.tl{background:rgba(61,184,138,.12);color:#4ECFA1;border:.5px solid rgba(61,184,138,.25)}
.th{background:rgba(123,111,232,.12);color:#A09AEF;border:.5px solid rgba(123,111,232,.25)}
.tn{background:rgba(212,153,42,.12);color:#D4992A;border:.5px solid rgba(212,153,42,.25)}

.empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--di);font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.06em;flex-direction:column;gap:8px;text-align:center;padding:2rem}

.detail-head{
  display:flex;align-items:flex-start;gap:1.25rem;
  margin-bottom:1.25rem;padding:1.1rem 1.15rem;
  background:var(--s1);border:.5px solid var(--b0);border-radius:8px;
  border-left:3px solid var(--stage-accent,var(--b1));
}
.detail-av-col{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:8px}
.detail-av{width:80px;height:80px;border-radius:8px;overflow:hidden;background:var(--s2);box-shadow:0 4px 20px rgba(0,0,0,.35)}
.detail-av img,.detail-av .hero-img{width:100%;height:100%;object-fit:cover;display:block;border-radius:8px}
.detail-av .hero-img.fallback{width:100%;height:100%;min-height:80px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;font-family:'Space Mono',monospace}
.detail-body{flex:1;min-width:0;padding-top:2px}
.detail-name{font-size:22px;font-weight:500;line-height:1.15;margin:0 0 5px;letter-spacing:-.2px}
.detail-origin{font-size:12px;color:var(--mu);margin:0 0 10px}
.detail-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.detail-pill{font-size:10px;padding:4px 10px;border-radius:2px;font-family:'Space Mono',monospace;font-weight:700;letter-spacing:.03em}
.detail-row .ai-tags{margin-top:0}
.detail-metrics{display:flex;gap:18px;flex-shrink:0;align-self:center;padding-left:.5rem}
.detail-metrics .ai-stat{min-width:46px}
.detail-metrics .ai-stat-val{font-size:15px;font-weight:500}
.photo-strip{display:flex;gap:5px;flex-wrap:wrap;justify-content:center}
.pthumb{width:36px;height:36px;border-radius:4px;object-fit:cover;cursor:pointer;border:2px solid transparent;opacity:.55;transition:opacity .12s,border-color .12s}
.pthumb:hover,.pthumb.on{opacity:1;border-color:var(--b2)}

.genres{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:1.1rem}
.gc{font-size:10px;padding:3px 8px;border-radius:2px;border:.5px solid var(--b1);color:var(--mu);font-family:'Space Mono',monospace;background:transparent;cursor:pointer;transition:color .12s,border-color .12s,background .12s}
.gc:hover{color:var(--tx);border-color:var(--b2)}
.gc.on{color:#080808;background:var(--tx);border-color:var(--tx);font-weight:700}

.sc-hero{background:linear-gradient(135deg,rgba(255,85,0,.14) 0%,var(--s1) 52%);border:.5px solid rgba(255,85,0,.42);border-radius:6px;padding:1rem 1.1rem;margin-bottom:1rem}
.sc-hero-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;gap:.5rem;flex-wrap:wrap}
.sc-brand{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:#ff5500;letter-spacing:.07em;text-transform:uppercase}
.sc-profile-link{font-size:11px;color:var(--mu);text-decoration:none;font-family:'Space Mono',monospace}
.sc-profile-link:hover{color:#ff5500}
.sc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(255,85,0,.22);border-radius:4px;overflow:hidden;margin-bottom:.6rem}
.sc-cell{background:rgba(8,8,8,.58);padding:10px 8px;text-align:center}
.sc-cell .sl{color:rgba(255,255,255,.42)}
.sc-cell .sv{color:#ff9a5c;font-size:19px}
.sc-cell--lead .sv{font-size:26px;color:#ff5500}
.sc-top{grid-column:1/-1;text-align:left;padding:10px 12px;background:rgba(8,8,8,.58);display:flex;gap:8px;align-items:baseline;flex-wrap:wrap}
.sc-top-lbl{font-size:9px;font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:.08em;color:var(--mu);flex-shrink:0}
.sc-top-title{font-size:12px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sc-top-plays{font-family:'Space Mono',monospace;font-size:12px;color:#ff5500;flex-shrink:0}
.sc-compare{font-size:11px;line-height:1.55;color:#c8c4bc;font-family:'Space Mono',monospace}
.sc-footnote{font-size:9px;color:var(--di);font-family:'Space Mono',monospace;margin-top:6px;letter-spacing:.03em}
.stats-row{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--b0);border-radius:4px;overflow:hidden;margin-bottom:1.1rem}
.stats-row .sc{padding:9px 8px}
.stats-row .sl{font-size:8px;letter-spacing:.06em}
.stats-row .sv{font-size:14px}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--b0);border-radius:4px;overflow:hidden;margin-bottom:1.1rem}
.sc{background:var(--s1);padding:11px 12px;text-align:center}
.trk-p{font-size:10px;color:rgba(255,154,92,.9);font-family:'Space Mono',monospace;flex-shrink:0}
.sl{font-size:9px;font-family:'Space Mono',monospace;letter-spacing:.08em;text-transform:uppercase;color:var(--mu);margin-bottom:4px}
.sv{font-size:18px;font-weight:500;font-family:'Space Mono',monospace;line-height:1}
.sbars{display:flex;justify-content:center;gap:2px;margin-top:5px}
.sb{width:12px;height:3px;border-radius:1px}
.sn{font-size:10px;color:var(--di);margin-top:4px;line-height:1.45}
.sec{font-size:9px;font-family:'Space Mono',monospace;letter-spacing:.1em;text-transform:uppercase;color:var(--di);margin-bottom:7px}
.sec-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:7px;flex-wrap:wrap}
.trk-sort{display:flex;gap:4px;flex-wrap:wrap}
.tsrt{font-size:9px;font-family:'Space Mono',monospace;padding:2px 8px;border-radius:2px;border:.5px solid var(--b1);background:transparent;color:var(--mu);cursor:pointer}
.tsrt:hover{color:var(--tx);border-color:var(--b2)}
.tsrt.on{color:#ff5500;border-color:rgba(255,85,0,.5);font-weight:700}
.bio{font-size:13px;line-height:1.8;color:#c5c5c5;margin-bottom:1.25rem}

.tracks{display:flex;flex-direction:column;gap:4px;margin-bottom:1.1rem;max-height:220px;overflow-y:auto}
.trk{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--s1);border:.5px solid var(--b0);border-radius:3px;cursor:pointer;text-align:left;width:100%;color:var(--tx);font-family:inherit;font-size:12px;transition:background .1s,border-color .1s}
.trk:hover{background:var(--s2);border-color:var(--b1)}
.trk.on{background:var(--s2);border-color:var(--b2)}
.trk-n{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.trk-d{font-size:10px;color:var(--di);font-family:'Space Mono',monospace;flex-shrink:0}
.trk-load{font-size:11px;color:var(--di);padding:8px;font-family:'Space Mono',monospace}
.trk.off{opacity:.45}
.trk-ext{
  display:inline-flex;align-items:center;justify-content:center;
  color:var(--mu);flex-shrink:0;width:28px;height:28px;
  border:.5px solid var(--b0);border-radius:2px;text-decoration:none;
}
.trk-ext:hover{color:var(--tx);border-color:var(--b1)}
.trk-ext .ico-ext{width:.45em;height:.45em}
.yt-open .ico-ext,.sc-profile-link .ico-ext{margin-left:3px}
.sc-note{font-size:11px;color:var(--tetra);margin:-4px 0 10px;line-height:1.45;font-family:'Space Mono',monospace}

/* ── listen hub (primary media) ── */
.listen{
  --accent:var(--listen-accent,#888);
  margin-bottom:1.35rem;
  border:.5px solid var(--b1);
  border-radius:8px;
  background:linear-gradient(165deg,color-mix(in srgb,var(--accent) 14%,transparent) 0%,var(--s1) 42%,var(--bg) 100%);
  overflow:hidden;
}
.listen-hdr{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:.85rem 1rem;border-bottom:.5px solid var(--b0);flex-wrap:wrap;
}
.listen-title{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase}
.listen-tabs{display:flex;gap:4px}
.listen-tab{
  font-size:10px;font-family:'Space Mono',monospace;padding:6px 14px;border-radius:3px;
  border:.5px solid var(--b1);background:rgba(0,0,0,.25);color:var(--mu);cursor:pointer;transition:all .12s;
}
.listen-tab:hover{color:var(--tx);border-color:var(--b2)}
.listen-tab.on{font-weight:700;color:#080808;border-color:transparent}
.listen-tab[data-tab="yt"].on{background:var(--yt)}
.listen-tab[data-tab="sc"].on{background:var(--sc)}
.listen-body{padding:1rem}
.listen-panel{display:none}
.listen-panel.on{display:grid;grid-template-columns:minmax(0,1fr) minmax(200px,280px);gap:1rem;align-items:start}
.listen-stage{
  border-radius:6px;overflow:hidden;background:#000;border:.5px solid var(--b0);
  aspect-ratio:16/9;min-height:180px;position:relative;
}
.listen-stage--sc{aspect-ratio:auto;min-height:0}
.listen-sc-embed iframe{display:block;width:100%;border:0;height:152px}
.listen-player iframe{display:block;width:100%;height:100%;border:0;position:absolute;inset:0}
.listen-player:not(:has(iframe)){display:flex;align-items:center;justify-content:center;padding:1.5rem;text-align:center}
.listen-queue{display:flex;flex-direction:column;gap:4px;max-height:min(340px,50vh);overflow-y:auto}
.listen-queue-hdr{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.listen-queue-hdr .sec{margin:0}
.listen-hint{
  font-size:9px;color:var(--di);font-family:'Space Mono',monospace;letter-spacing:.04em;
  padding:.55rem 1rem;border-top:.5px solid var(--b0);text-align:center;
}
.q-item{
  display:flex;align-items:center;gap:10px;padding:9px 10px;background:rgba(0,0,0,.35);
  border:.5px solid var(--b0);border-radius:4px;cursor:pointer;text-align:left;width:100%;
  color:var(--tx);font-family:inherit;font-size:12px;transition:background .12s,border-color .12s,box-shadow .12s;
}
.q-item:hover{background:var(--s2);border-color:var(--b1)}
.q-item.on{border-color:var(--accent);box-shadow:inset 3px 0 0 var(--accent);background:var(--s2)}
.q-item-n{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.35}
.q-item-m{font-size:10px;color:var(--di);font-family:'Space Mono',monospace;flex-shrink:0}
.q-item.off{opacity:.45}
.listen-empty{font-size:11px;color:var(--di);padding:1rem;font-family:'Space Mono',monospace}
.yt-open{display:inline-block;margin-top:8px;font-size:11px;font-family:'Space Mono',monospace;color:var(--mu);text-decoration:none}
.yt-open:hover{color:var(--yt)}

.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem 1.25rem;margin-bottom:1.25rem}
.detail-card{background:var(--s1);border:.5px solid var(--b0);border-radius:6px;padding:1rem 1.1rem}
.detail-card .sec{margin-bottom:.65rem}
.detail-card .bio{margin:0;font-size:13px;line-height:1.75}
.detail-card .links{margin:0}

.links{display:flex;flex-direction:column;gap:5px}
.lk{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--s1);border:.5px solid var(--b0);border-radius:3px;text-decoration:none;color:var(--tx);transition:background .1s,border-color .1s}
.lk:hover{background:var(--s2);border-color:var(--b1)}
.lk-ico{font-size:15px;color:var(--mu);flex-shrink:0;width:18px;text-align:center;font-family:'Space Mono',monospace;font-weight:700}
.lk-t{flex:1}
.lk-label{font-size:12px;font-weight:500}
.lk-sub{font-size:11px;color:var(--mu);margin-top:1px}
.lk-arr{color:var(--di);font-size:11px;display:inline-flex;align-items:center}
.lk-arr .ico-ext{width:.5em;height:.5em;border-width:1.2px}

/* player bar */
.player{
  position:fixed;left:0;right:0;bottom:0;min-height:var(--player-h);
  background:linear-gradient(180deg,#121212 0%,#0a0a0a 100%);
  border-top:.5px solid var(--b1);display:flex;align-items:center;gap:10px;
  padding:10px 1.25rem;z-index:100;box-sizing:border-box;
}
.pnav{display:flex;gap:4px;flex-shrink:0}
.pbtn{
  width:36px;height:36px;border-radius:50%;border:.5px solid var(--b1);background:var(--s1);color:var(--tx);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .12s;touch-action:manipulation;-webkit-tap-highlight-color:transparent;
}
.pbtn svg{width:18px;height:18px;fill:currentColor;display:block;flex-shrink:0}
.pbtn:hover:not(:disabled){border-color:var(--b2);background:var(--s2)}
.pbtn:disabled{opacity:.25;cursor:default}
.pplay{width:44px;height:44px;border-color:var(--b2)}
.pplay svg{width:20px;height:20px}
#btnPlay .ico-pause{display:none}
#btnPlay.is-playing .ico-play{display:none}
#btnPlay.is-playing .ico-pause{display:block}
.pcontrols{display:flex;align-items:center;gap:4px;flex-shrink:0}
.ico-ext{
  display:inline-block;width:.55em;height:.55em;margin-left:2px;vertical-align:.08em;
  border-top:1.5px solid currentColor;border-right:1.5px solid currentColor;
  transform:translateY(-.05em);
}
.chip-x{
  position:relative;display:inline-block;width:10px;height:10px;
  margin-left:4px;opacity:.45;vertical-align:middle;flex-shrink:0;
}
.chip-x::before,.chip-x::after{
  content:'';position:absolute;left:50%;top:50%;width:8px;height:1px;
  margin-left:-4px;margin-top:-.5px;background:currentColor;border-radius:1px;
}
.chip-x::before{transform:rotate(45deg)}
.chip-x::after{transform:rotate(-45deg)}
.sort-tag{font-size:8px;letter-spacing:.04em;opacity:.7;text-transform:uppercase}
.pinfo{
  flex:1 1 0;min-width:0;
  display:grid;grid-template-columns:48px minmax(0,1fr);column-gap:12px;align-items:start;
  overflow:hidden;
}
.pthumb-sm{
  grid-column:1;grid-row:1;
  width:48px;height:48px;border-radius:6px;
  background:var(--s2);overflow:hidden;
}
.pthumb-sm img{display:block;width:100%;height:100%;object-fit:cover}
.pthumb-sm.fallback{
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-family:'Space Mono',monospace;font-weight:700;
}
.pinfo-text{grid-column:2;grid-row:1;min-width:0;overflow:hidden}
.ptitle{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.25}
.psub{font-size:10px;color:var(--mu);font-family:'Space Mono',monospace;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.pnow{display:flex;align-items:center;gap:8px;margin-top:4px;min-width:0;max-width:100%}
.psrc{
  font-size:8px;font-family:'Space Mono',monospace;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  padding:2px 6px;border-radius:2px;flex-shrink:0;
}
.psrc--yt{background:rgba(255,59,48,.2);color:#ff6b63}
.psrc--sc{background:rgba(255,85,0,.2);color:#ff9a5c}
.psrc--idle{background:var(--s2);color:var(--di)}
.ptrk{font-size:11px;color:#c8c4bc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--di);border-radius:2px}

// ── helpers ──────────────────────────────────────────────────────
const col=id=>ST[id]?.c||'#888';
const stn=id=>ST[id]?.n||id;

function ini(n){
  return n.replace(/\(.*?\)/g,'').split(/[\s&b2]+/).filter(w=>/[a-zA-Zµ]/.test(w)).map(w=>w[0]).join('').slice(0,2).toUpperCase();
}

function jsAttrStr(s){
  return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
}

function fmt(n){
  if(!n||n<=0)return'—';
  if(n>=1000000)return(n/1e6).toFixed(1)+'M';
  if(n>=1000)return(n>=10000?Math.round(n/1000):(n/1000).toFixed(1))+'K';
  return String(n);
}

function bars(v,max,c){
  const f=v<=0?0:Math.max(1,Math.min(5,Math.round(Math.log10(Math.max(v,1))/Math.log10(max)*5)));
  return Array.from({length:5},(_,i)=>`<div class="sb" style="background:${i<f?c:'rgba(255,255,255,.07)'}"></div>`).join('');
}

function scSlug(a){
  const raw=(a.sc||'').trim();
  if(!raw)return '';
  if(raw.includes('soundcloud.com')){
    const m=raw.match(/soundcloud\.com\/([^/?#]+)/i);
    return m?m[1]:raw;
  }
  return raw.replace(/^@/,'');
}

function scProfileUrl(a){
  const s=scSlug(a);
  return s?`https://soundcloud.com/${s}`:'';
}

function scEmbedUrl(a,trackUrl='',autoplay=false){
  const s=scSlug(a);
  if(!s&&!trackUrl)return '';
  const c=col(a.stage).replace('#','');
  const target=trackUrl||`https://soundcloud.com/${s}`;
  const play=autoplay?'true':'false';
  return `https://w.soundcloud.com/player/?url=${encodeURIComponent(target)}&color=${c}&auto_play=${play}&hide_related=false&show_comments=false&show_user=true&show_reposts=false&show_teaser=false&single_active=false`;
}

function scTrackUrl(s){
  if(!s)return '';
  if(s.permalink_url)return s.permalink_url;
  if(s.uri&&String(s.uri).startsWith('http'))return s.uri;
  if(s.uri)return 'https://soundcloud.com'+s.uri;
  if(s.id)return `https://api.soundcloud.com/tracks/${s.id}`;
  return '';
}

function trackEmbedBlocked(s){
  if(!s)return true;
  if(s.sharing==='private')return true;
  const e=s.embeddable_by;
  return !!(e&&e!=='all');
}

function trackPlayable(s){
  if(!s||trackEmbedBlocked(s))return false;
  return !!(s.title&&scTrackUrl(s));
}

function scSoundsFromCache(slug){
  const d=slug&&SC_LIVE[slug];
  if(!d?.tops?.length)return [];
  return d.tops.map(row=>({
    title:row[0],
    playback_count:row[1],
    permalink_url:row[2],
    streamable:true,
  }));
}

function ytVideos(a){
  return YT_LIVE[a?.id]||[];
}

function embedOrigin(){
  const o=location.origin;
  return o&&o!=='null'?o:'https://localhost';
}

function ytEmbedSrc(id,autoplay=true){
  const ap=autoplay?'&autoplay=1':'';
  const origin=`&origin=${encodeURIComponent(embedOrigin())}`;
  return `https://www.youtube.com/embed/${id}?enablejsapi=1&rel=0&modestbranding=1${origin}${ap}`;
}

function ytPlayerHtml(id,autoplay){
  const open=`<a class="yt-open" href="https://www.youtube.com/watch?v=${id}" target="_blank" rel="noopener">Open on YouTube <span class="ico-ext" aria-hidden="true"></span></a>`;
  const iframe=`<iframe src="${ytEmbedSrc(id,autoplay)}" referrerpolicy="strict-origin-when-cross-origin" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture;web-share" allowfullscreen title="YouTube"></iframe>`;
  return iframe+open;
}

function pauseYouTube(){
  document.querySelectorAll('#ytPlayer iframe').forEach(fr=>{
    try{
      fr.contentWindow?.postMessage(JSON.stringify({event:'command',func:'pauseVideo',args:''}),'*');
    }catch(_){}
  });
  ytPlaying=false;
  syncPlayerTransport();
}

function pauseSoundCloud(){
  if(!widget)return;
  try{widget.pause();}catch(_){}
  playing=false;
  syncPlayerTransport();
}

function stopOtherMedia(active){
  if(active!=='sc')pauseSoundCloud();
  if(active!=='yt')pauseYouTube();
}

  if(tab===listenTab)return;
  if(tab==='sc')pauseYouTube();
  if(tab==='yt'&&playing)pauseSoundCloud();
  listenTab=tab;
  applyListenTabUI(tab);
  syncPlayerTransport();
}

function setPlayBtnState(isPlaying,title){
  const btnPlay=document.getElementById('btnPlay');
  if(!btnPlay)return;
  btnPlay.classList.toggle('is-playing',!!isPlaying);
  btnPlay.title=title||'Play';
  btnPlay.setAttribute('aria-label',title||'Play');
}

function syncPlayerTransport(){
  const srcEl=document.getElementById('playerSource');
  const trackEl=document.getElementById('playerTrack');
  const a=A.find(x=>x.id===sel);
  if(!srcEl||!trackEl)return;

  if(mediaSource==='yt'){
    const vids=a?ytVideos(a):[];
    const v=vids[ytIdx];
    srcEl.className='psrc psrc--yt';
    srcEl.textContent='YouTube';
    trackEl.textContent=v?.title||'Video';
    setPlayBtnState(ytPlaying,ytPlaying?'Pause video':'Play video');
    document.getElementById('btnPrevT').disabled=!vids.length;
    document.getElementById('btnNextT').disabled=!vids.length;
  }else if(mediaSource==='sc'){
    const s=sounds[trackIdx];
    srcEl.className='psrc psrc--sc';
    srcEl.textContent='SoundCloud';
    trackEl.textContent=s?.title||'Track';
    setPlayBtnState(playing,playing?'Pause':'Play');
    document.getElementById('btnPrevT').disabled=!widgetReady||!sounds.length;
    document.getElementById('btnNextT').disabled=!widgetReady||!sounds.length;
  }else{
    srcEl.className='psrc psrc--idle';
    srcEl.textContent='Ready';
    const canYt=listenTab==='yt'&&a&&ytVideos(a).length;
    const canSc=listenTab==='sc'&&widgetReady&&sounds.length;
    trackEl.textContent=canYt?'Pick a video above':canSc?'Pick a track above':'Select a video or track';
    setPlayBtnState(false,'Play / pause');
    document.getElementById('btnPrevT').disabled=!canYt&&!canSc;
    document.getElementById('btnNextT').disabled=!canYt&&!canSc;
  }
}


function trackPopularity(s){
  if(!s)return 0;
  return s.playback_count
    ||s.favoritings_count
    ||s.likes_count
    ||s.reposts_count
    ||0;
}

function sortSoundsByPopularity(list){
  return [...list].sort((a,b)=>{
    const d=trackPopularity(b)-trackPopularity(a);
    if(d)return d;
    return (a.title||'').localeCompare(b.title||'');
  });
}

function applyTrkSort(list){
  if(!list?.length)return list||[];
  if(trkSort==='title')return [...list].sort((a,b)=>(a.title||'').localeCompare(b.title||''));
  if(trkSort==='duration')return [...list].sort((a,b)=>(b.duration||0)-(a.duration||0));
  return sortSoundsByPopularity(list);
}

function setTrkSort(mode,btn){
  trkSort=mode;
  document.querySelectorAll('.tsrt').forEach(b=>b.classList.toggle('on',b.dataset.ts===mode));
  if(!sounds.length)return;
  const cur=sounds[trackIdx];
  sounds=applyTrkSort(sounds);
  const ni=indexInSounds(cur);
  trackIdx=ni>=0?ni:firstPlayableIdx();
  renderTracks();
}

function soundKey(s){
  if(!s)return '';
  if(s.id!=null)return String(s.id);
  return scTrackUrl(s);
}

function indexInSounds(sound){
  const k=soundKey(sound);
  if(!k)return -1;
  return sounds.findIndex(s=>soundKey(s)===k);
}

function firstPlayableIdx(){
  const i=sounds.findIndex(trackPlayable);
  return i>=0?i:0;
}

function scPhotoFromCache(a){
  const slug=scSlug(a);
  const d=slug&&SC_LIVE[slug];
  if(!d)return '';
  if(d.av&&!String(d.av).includes('default_avatar'))return d.av;
  if(d.vis)return d.vis;
  return '';
}

function photoUrl(a,idx=0){
  if(a.img&&!idx)return a.img;
  if(a.photos?.[idx])return a.photos[idx];
  if(!idx){
    const sc=scPhotoFromCache(a);
    if(sc)return sc;
  }
  const s=scSlug(a);
  if(a.ig_h&&!idx)return `https://unavatar.io/instagram/${encodeURIComponent(a.ig_h)}`;
  if(s&&!idx)return `https://unavatar.io/soundcloud/${encodeURIComponent(s)}`;
  return '';
}

function scCached(a){
  const slug=scSlug(a);
  return slug?SC_LIVE[slug]:null;
}

function scCompareText(a, scFollowers){
  if(!scFollowers||!a)return '';
  const sc=scFollowers, ig=a.ig||0;
  if(ig>0&&sc>ig*1.5&&sc>15000)
    return `${fmt(sc)} SC followers — a deep mix archive beyond the ${fmt(ig)} Instagram audience.`;
  if(sc>80000)
    return `${fmt(sc)} SoundCloud followers — a major catalog. For this lineup, SC is the number that actually reflects their reach.`;
  if(sc>12000)
    return `${fmt(sc)} SC followers — sets, uploads, and plays tell the story streaming charts miss.`;
  return '';
}

function scHeroHtml(a){
  const slug=scSlug(a);
  const profile=scProfileUrl(a);
  if(!slug)return '';
  const d=scCached(a);
  if(!d||d.err)return `<div class="sc-hero" id="scHero"><div class="sc-brand">SoundCloud</div><div class="sc-footnote">No public profile linked for this slot.</div></div>`;

// ── genre families (refine + chips) ──────────────────────────────
const GENRE_FAMILIES=[
  {id:'techno',label:'Techno',kw:['techno','industrial','acid','hardcore','minimal','peak','trance','electro','rave','hard dance']},
  {id:'house',label:'House / Disco',kw:['house','disco','garage','ukg','uk garage','funk','soulful','italo','hyperpop']},
  {id:'ambient',label:'Ambient / Dub',kw:['ambient','dub','downtempo','experimental','modular','leftfield','drone','idm','electronic']},
  {id:'breaks',label:'Breaks / Bass',kw:['break','drum','dnb','jungle','bass','grime','footwork','broken beat','broken']},
  {id:'live',label:'Live / Hybrid',kw:['live','hybrid','av ','performance','electroacoustic']},
  {id:'other',label:'Other',kw:[]},
];

function allLineupGenres(){
  const s=new Set();
  for(const a of A)for(const g of (a.genres||[]))if(g)s.add(g);
  return [...s].sort((a,b)=>a.localeCompare(b));
}

function genreFamilyOf(genre){
  const g=(genre||'').toLowerCase();
  for(const f of GENRE_FAMILIES){
    if(f.id==='other')continue;
    if(f.kw.some(k=>{
      if(k==='electro'&&g.includes('electronic'))return false;
      return g.includes(k);
    }))return f.id;
  }
  return 'other';
}

function genreFamilyLabel(id){
  return GENRE_FAMILIES.find(f=>f.id===id)?.label||id;
}

function artistGenreFamilies(a){
  const s=new Set();
  for(const g of (a.genres||[]))s.add(genreFamilyOf(g));
  return s;
}

// ── sort / filter ────────────────────────────────────────────────
let sortBy='lineup', sortDir='asc';
const tagFilt=new Set();
const genreFamilyFilt=new Set();
let exactGenreFilt='';
let qSearch='';

const SORT_LABELS={lineup:'lineup',scf:'SC',scp:'plays',ra:'RA',ig:'IG',name:'A–Z'};
const SORT_NAMES={lineup:'Lineup',scf:'SC followers',scp:'SC plays',ra:'RA',ig:'Instagram',name:'Name'};
const TAG_LABELS={hl:'Headliner',live:'Live',warm:'Warm-up',local:'NL',sc:'SC'};

function lineupIdx(a){return A.findIndex(x=>x.id===a.id)}
function statScF(a){return scCached(a)?.f||0}
function statScP(a){return scCached(a)?.p||0}
function statRa(a){return a.ra||0}
function statIg(a){return a.ig||0}
function matchesTagFilt(a){
  if(!tagFilt.size)return true;
  for(const t of tagFilt){
    if(t==='hl'&&!a.hl)return false;
    if(t==='live'&&!a.live)return false;
    if(t==='warm'&&!a.warm)return false;
    if(t==='local'&&!a.local)return false;
    if(t==='sc'&&!scSlug(a))return false;
  }
  return true;
}

function matchesGenreFilt(a){
  if(exactGenreFilt){
    return (a.genres||[]).some(g=>g.toLowerCase()===exactGenreFilt.toLowerCase());
  }
  if(!genreFamilyFilt.size)return true;
  const fam=artistGenreFamilies(a);
  for(const id of genreFamilyFilt){
    if(fam.has(id))return true;
  }
  return false;
}

function hasActiveRefine(){
  return tagFilt.size>0||genreFamilyFilt.size>0||!!exactGenreFilt;
}

function matchesSearch(a){
  if(!qSearch)return true;
  const q=qSearch.toLowerCase();
  const sc=scSlug(a);
  const city=(scCached(a)?.c||'').toLowerCase();
  return a.name.toLowerCase().includes(q)
    ||a.origin.toLowerCase().includes(q)
    ||city.includes(q)
    ||(a.genres||[]).some(g=>g.toLowerCase().includes(q))
    ||(sc&&sc.toLowerCase().includes(q));
}

function stageArtists(){
  return filt==='all'?A:A.filter(a=>a.stage===filt);
}

function displayedArtists(){
  let list=stageArtists().filter(a=>matchesTagFilt(a)&&matchesGenreFilt(a)&&matchesSearch(a));
  if(sortBy==='lineup'){
    list.sort((a,b)=>lineupIdx(a)-lineupIdx(b));
    return list;
  }
  const dir=sortDir==='desc'?-1:1;
  const cmpNum=(va,vb)=>((va||0)-(vb||0))*dir;
  list=[...list].sort((a,b)=>{
    let d=0;
    switch(sortBy){
      case 'scf': d=cmpNum(statScF(a),statScF(b)); break;
      case 'scp': d=cmpNum(statScP(a),statScP(b)); break;
      case 'ra': d=cmpNum(statRa(a),statRa(b)); break;
      case 'ig': d=cmpNum(statIg(a),statIg(b)); break;
      case 'name': return dir*a.name.localeCompare(b.name);
    }
    return d||a.name.localeCompare(b.name);
  });
  return list;
}

function sortStatDisplay(a){
  switch(sortBy){
    case 'scf': return {v:fmt(statScF(a)),c:'#ff5500'};
    case 'scp': return {v:fmt(statScP(a)),c:'#ff9a5c'};
    case 'ra': return {v:fmt(statRa(a)),c:col(a.stage)};
    case 'ig': return {v:fmt(statIg(a)),c:col(a.stage)};
    case 'name': return {v:a.name.split(/[\s(]/)[0],c:'var(--mu)'};
    default: return null;
  }
}

function updateListCount(){
  const el=document.getElementById('listCount');
  if(!el)return;
  const n=displayedArtists().length;
  const total=stageArtists().length;
  const parts=[n===total?`${n} artists`:`${n} / ${total}`];
  if(sortBy!=='lineup')parts.push(sortDir==='desc'?'desc':'asc');
  el.textContent=parts.join(' · ');
}

function closePanels(except){
  if(except!=='sort'){
    document.getElementById('sortMenu')?.setAttribute('hidden','');
    document.getElementById('sortBtn')?.classList.remove('open');
    document.getElementById('sortBtn')?.setAttribute('aria-expanded','false');
  }
  if(except!=='refine'){
    document.getElementById('refinePanel')?.setAttribute('hidden','');
    document.getElementById('refineBtn')?.classList.remove('open');
    document.getElementById('refineBtn')?.setAttribute('aria-expanded','false');
  }
}

function toggleSortMenu(e){
  e.stopPropagation();
  const menu=document.getElementById('sortMenu');
  const btn=document.getElementById('sortBtn');
  const open=menu?.hasAttribute('hidden');
  closePanels(open?'sort':null);
  if(open){
    menu.removeAttribute('hidden');
    btn.classList.add('open');
    btn.setAttribute('aria-expanded','true');
  }
}

function toggleRefine(e){
  e.stopPropagation();
  const panel=document.getElementById('refinePanel');
  const btn=document.getElementById('refineBtn');
  const open=panel?.hasAttribute('hidden');
  closePanels(open?'refine':null);
  if(open){
    panel.removeAttribute('hidden');
    btn.classList.add('open');
    btn.setAttribute('aria-expanded','true');
  }
}

function pickSort(metric){
  if(sortBy===metric&&metric!=='lineup'){
    sortDir=sortDir==='desc'?'asc':'desc';
  }else{
    sortBy=metric;
    sortDir=metric==='name'?'asc':'desc';
  }
  refreshSortUI();
  closePanels();
  applyListControls();
}

function sortDirTag(){return sortDir==='desc'?'desc':'asc';}

function refreshSortUI(){
  const arr=sortBy!=='lineup'?' '+sortDirTag():'';
  const btn=document.getElementById('sortBtn');
  if(btn)btn.textContent='Sort · '+(SORT_NAMES[sortBy]||sortBy)+arr;
  document.querySelectorAll('.dd-item').forEach(b=>{
    const on=b.dataset.sort===sortBy;
    b.classList.toggle('on',on);
    const base=b.textContent.replace(/\s(desc|asc)$/,'').trim();
    const label=SORT_NAMES[b.dataset.sort]||base;
    if(on&&sortBy!=='lineup')b.textContent=label+' '+sortDirTag();
    else b.textContent=label;
  });
}

function genreSelectValue(){
  if(exactGenreFilt)return 'g:'+exactGenreFilt;
  if(genreFamilyFilt.size===1)return 'f:'+[...genreFamilyFilt][0];
  return '';
}

function refreshRefineUI(){
  document.querySelectorAll('.ft[data-t]').forEach(b=>{
    b.classList.toggle('on',tagFilt.has(b.dataset.t));
  });
  const sel=document.getElementById('genreSelect');
  if(sel){
    const v=genreSelectValue();
    if(sel.value!==v)sel.value=v;
  }
  const rb=document.getElementById('refineBtn');
  if(rb)rb.classList.toggle('has-filt',hasActiveRefine());
}

function setTag(tag,btn){
  if(tagFilt.has(tag))tagFilt.delete(tag);
  else tagFilt.add(tag);
  if(btn)btn.classList.toggle('on',tagFilt.has(tag));
  else document.querySelectorAll(`.ft[data-t="${tag}"]`).forEach(b=>b.classList.toggle('on',tagFilt.has(tag)));
  refreshRefineUI();
  renderActiveChips();
  syncUrlState();
  applyListControls();
}

function onGenreSelect(el){
  const v=el.value;
  exactGenreFilt='';
  genreFamilyFilt.clear();
  if(v.startsWith('f:'))genreFamilyFilt.add(v.slice(2));
  else if(v.startsWith('g:'))exactGenreFilt=v.slice(2);
  refreshRefineUI();
  renderActiveChips();
  syncUrlState();
  applyListControls();
}

function filterByGenre(genre){
  const sameExact=exactGenreFilt&&exactGenreFilt.toLowerCase()===genre.toLowerCase();
  exactGenreFilt=sameExact?'':genre;
  if(!sameExact)genreFamilyFilt.clear();
  refreshRefineUI();
  renderActiveChips();
  syncUrlState();
  applyListControls();
}

function clearRefine(){
  tagFilt.clear();
  genreFamilyFilt.clear();
  exactGenreFilt='';
  refreshRefineUI();
  renderActiveChips();
  syncUrlState();
  applyListControls();
}

function removeChip(type,value){
  if(type==='tag')tagFilt.delete(value);
  else if(type==='genre')genreFamilyFilt.delete(value);
  else if(type==='exact')exactGenreFilt='';
  refreshRefineUI();
  renderActiveChips();
  syncUrlState();
  applyListControls();
}

function renderActiveChips(){
  const bar=document.getElementById('chipbar');
  if(!bar)return;
  const chips=[];
  for(const t of tagFilt){
    chips.push({type:'tag',value:t,label:TAG_LABELS[t]||t});
  }
  if(exactGenreFilt){
    chips.push({type:'exact',value:exactGenreFilt,label:exactGenreFilt});
  }else{
    for(const g of genreFamilyFilt){
      chips.push({type:'genre',value:g,label:genreFamilyLabel(g)});
    }
  }
  if(!chips.length){
    bar.innerHTML='';
    bar.setAttribute('hidden','');
    updateTopChrome();
    return;
  }
  bar.removeAttribute('hidden');
  bar.innerHTML=chips.map(c=>
    `<button type="button" class="chip" onclick="removeChip('${jsAttrStr(c.type)}','${jsAttrStr(c.value)}')">${c.label}<span class="chip-x" aria-hidden="true"></span></button>`
  ).join('')+`<button type="button" class="chip-clear" onclick="clearRefine()">Clear</button>`;
  updateTopChrome();
}

function updateTopChrome(){
  const el=document.getElementById('topChrome');
  if(!el)return;
  const h=el.offsetHeight||220;
  document.documentElement.style.setProperty('--top-chrome',h+'px');
  if(isMobile())document.documentElement.style.setProperty('--chrome',h+'px');
}

function buildGenreSelect(){
  const el=document.getElementById('genreSelect');
  if(!el)return;
  const fam=GENRE_FAMILIES.filter(f=>f.id!=='other').map(f=>
    `<option value="f:${f.id}">${f.label}</option>`
  ).join('');
  const genres=allLineupGenres().map(g=>
    `<option value="g:${jsAttrStr(g)}">${g}</option>`
  ).join('');
  el.innerHTML=`<option value="">All genres</option><optgroup label="Style">${fam}</optgroup><optgroup label="Genre">${genres}</optgroup>`;
  const v=genreSelectValue();
  if(v)el.value=v;
}

function syncUrlState(){
  const p=new URLSearchParams();
  if(filt!=='all')p.set('stage',filt);
  if(sortBy!=='lineup')p.set('sort',sortBy+(sortDir==='desc'?':desc':''));
  if(qSearch)p.set('q',qSearch);
  if(tagFilt.size)p.set('tags',[...tagFilt].join(','));
  if(exactGenreFilt)p.set('genre',exactGenreFilt);
  else if(genreFamilyFilt.size)p.set('gf',[...genreFamilyFilt].join(','));
  const qs=p.toString();
  const hash=qs?'#'+qs:'';
  if(location.hash!==hash)history.replaceState(null,'',hash||location.pathname+location.search);
}

function readUrlState(){
  const raw=location.hash.replace(/^#/,'');
  if(!raw)return;
  const p=new URLSearchParams(raw);
  const stage=p.get('stage');
  if(stage){
    const fb=document.querySelector(`.fb[data-s="${stage}"]`);
    if(fb)go(stage,fb);
  }
  const sort=p.get('sort');
  if(sort){
    const [m,dir]=sort.split(':');
    if(SORT_NAMES[m]){
      sortBy=m;
      sortDir=dir==='desc'?'desc':'asc';
    }
  }
  const q=p.get('q');
  if(q){
    qSearch=q;
    const inp=document.getElementById('qSearch');
    if(inp)inp.value=q;
  }
  const tags=p.get('tags');
  if(tags)tags.split(',').forEach(t=>{if(TAG_LABELS[t])tagFilt.add(t);});
  const gf=p.get('gf');
  if(gf)gf.split(',').forEach(g=>{if(GENRE_FAMILIES.some(f=>f.id===g))genreFamilyFilt.add(g);});
  const genre=p.get('genre');
  if(genre)exactGenreFilt=genre;
}

function setSearch(v){
  qSearch=(v||'').trim();
  syncUrlState();
  applyListControls();
}

function applyListControls(){
  const list=displayedArtists();
  if(sel&&!list.some(a=>a.id===sel))sel=null;
  ensureSelection();
  updateListCount();
  refreshSortUI();
  refreshRefineUI();
  renderActiveChips();
  renderStoryCtx();
  renderList();
  renderDetail();
  updatePlayerMeta();
  syncMobilePane();
}


// ── state ────────────────────────────────────────────────────────
let filt='all', sel=null;
let widget=null, sounds=[], trackIdx=0, playing=false, heroPhotoIdx=0;
let widgetReady=false, scNote='', pendingMediaAutoplay=null;
let trkSort='plays', ytIdx=0;
let listenTab='yt', mediaSource=null, ytPlaying=false;

// mobile split pane (list ↔ detail)
const SPLIT={list:.56,mid:.34,detail:.17};
let splitPct=SPLIT.mid;
let splitDrag=null,splitMoved=false;

function isMobile(){return window.matchMedia('(max-width:768px)').matches;}

function syncMobilePane(){
  const layout=document.getElementById('layout');
  if(!layout)return;
  if(!isMobile()){
    layout.classList.remove('mobile-list','mobile-detail');
    return;
  }
  const showDetail=!!sel&&!!A.find(x=>x.id===sel);
  layout.classList.toggle('mobile-list',!showDetail);
  layout.classList.toggle('mobile-detail',showDetail);
}

function mobileBackToList(){
  if(!isMobile())return;
  const layout=document.getElementById('layout');
  layout?.classList.add('mobile-list');
  layout?.classList.remove('mobile-detail');
  document.getElementById('list')?.scrollTo({top:0,behavior:'smooth'});
}

function applySplit(animate){
  const layout=document.getElementById('layout');
  const handle=document.getElementById('splitHandle');
  if(!layout||!isMobile())return;
  const h=layout.getBoundingClientRect().height;
  const handleH=handle?.offsetHeight||44;
  const listPx=Math.round((h-handleH)*splitPct);
  layout.style.setProperty('--split-list-px',Math.max(72,listPx)+'px');
  if(animate){
    layout.classList.add('split-animate');
    clearTimeout(applySplit._t);
    applySplit._t=setTimeout(()=>layout.classList.remove('split-animate'),300);
  }
}

function setSplit(ratio,animate){
  splitPct=Math.max(.14,Math.min(.7,ratio));
  applySplit(animate);
}

function snapSplit(velocity=0){
  const targets=[SPLIT.detail,SPLIT.mid,SPLIT.list];
  let best=targets[0],bestD=Infinity;
  for(const t of targets){
    let d=Math.abs(t-splitPct);
    if(velocity>0.25&&t>splitPct)d-=0.06;
    if(velocity<-0.25&&t<splitPct)d-=0.06;
    if(d<bestD){bestD=d;best=t;}
  }
  setSplit(best,true);
}

function initMobileSplit(){
  const handle=document.getElementById('splitHandle');
  const layout=document.getElementById('layout');
  if(!handle||!layout)return;

  const yOf=e=>(e.touches?e.touches[0]:e).clientY;

  const onStart=e=>{
    if(!isMobile())return;
    splitMoved=false;
    splitDrag={y0:yOf(e),p0:splitPct,t0:performance.now()};
    layout.classList.add('split-dragging');
    handle.setPointerCapture(e.pointerId);
    e.preventDefault();
  };

  const onMove=e=>{
    if(!splitDrag)return;
    const handleH=handle.offsetHeight||44;
    const h=layout.getBoundingClientRect().height-handleH;
    const dy=yOf(e)-splitDrag.y0;
    if(Math.abs(dy)>6)splitMoved=true;
    setSplit(splitDrag.p0+dy/h,false);
    e.preventDefault();
  };

  const onEnd=e=>{
    if(!splitDrag)return;
    const handleH=handle.offsetHeight||44;
    const h=layout.getBoundingClientRect().height-handleH;
    const dy=yOf(e)-splitDrag.y0;
    const dt=(performance.now()-splitDrag.t0)/1000;
    const vel=dy/h/Math.max(dt,.05);
    layout.classList.remove('split-dragging');
    if(!splitMoved){
      setSplit(splitPct<SPLIT.mid?SPLIT.list:SPLIT.detail,true);
    }else{
      snapSplit(vel);
    }
    splitDrag=null;
  };

  handle.addEventListener('pointerdown',onStart);
  handle.addEventListener('pointermove',onMove);
  handle.addEventListener('pointerup',onEnd);
  handle.addEventListener('pointercancel',onEnd);

  window.addEventListener('resize',()=>syncMobilePane());
  syncMobilePane();
}

// ── visible list (stage + sort + filter) ─────────────────────────
function visibleArtists(){
  return displayedArtists();
}

function selIndex(){
  return visibleArtists().findIndex(a=>a.id===sel);
}

// ── SoundCloud widget (visible embed in detail panel) ────────────
function shouldUseCachedTracks(slug,list){
  if(!slug||!list?.length)return !!(slug&&SC_LIVE[slug]?.tops?.length);
  return !list.some(trackPlayable);
}

function loadSounds(attempt=0){
  if(!widget)return;
  widget.getSounds(s=>{
    let list=s||[];
    const a=A.find(x=>x.id===sel);
    const slug=scSlug(a);
    const ready=list.length>0&&list.every(t=>t&&t.title);
    if(!ready&&attempt<20){
      setTimeout(()=>loadSounds(attempt+1),200);
      return;
    }
    if(shouldUseCachedTracks(slug,list)){
      const cached=scSoundsFromCache(slug);
      if(cached.length)list=cached;
    }
    sounds=applyTrkSort(list);
    trackIdx=firstPlayableIdx();
    scNote='';
    renderTracks();
    updatePlayerMeta();
    if(pendingMediaAutoplay==='sc'){
      pendingMediaAutoplay=null;
      playTrack(trackIdx);
    }
  });
}

function bindWidget(){
  const iframe=document.getElementById('scEmbed');
  if(!iframe||typeof SC==='undefined')return;
  widgetReady=false;
  sounds=[];trackIdx=0;scNote='';
  widget=SC.Widget(iframe);
  widget.bind(SC.Widget.Events.READY,()=>{
    widgetReady=true;
    loadSounds();
  });
  widget.bind(SC.Widget.Events.PLAY,()=>{
    if(listenTab==='yt'&&mediaSource!=='sc'){
      try{widget.pause();}catch(_){}
      return;
    }
    stopOtherMedia('sc');
    playing=true;scNote='';
    mediaSource='sc';
    listenTab='sc';
    applyListenTabUI('sc');
    syncTrackIdx();
    syncPlayerTransport();
  });
  widget.bind(SC.Widget.Events.PAUSE,()=>{playing=false;syncPlayerTransport();});
  widget.bind(SC.Widget.Events.FINISH,()=>{navTrack(1);});
  widget.bind(SC.Widget.Events.ERROR,()=>{
    playing=false;
    syncPlayerTransport();
    const a=A.find(x=>x.id===sel);
    const d=scSlug(a)&&SC_LIVE[scSlug(a)];
    scNote=d?.pro
      ? 'This track may not play in the embed (common with SoundCloud Pro) — open on SoundCloud or switch to YouTube.'
      : 'This track cannot play in the embed — open it on SoundCloud via the link on the track.';
    renderTracks();
  });
}

function syncTrackIdx(){
  if(!widget)return;
  widget.getCurrentSound(sound=>{
    const mapped=indexInSounds(sound);
    if(mapped>=0){
      trackIdx=mapped;
      renderTracks();
      updatePlayerMeta();
      return;
    }
    widget.getCurrentSoundIndex(i=>{trackIdx=i;renderTracks();updatePlayerMeta();});
  });
}

function togglePlay(){
  if(!sel)return;
  if(mediaSource==='yt'){
    const fr=document.querySelector('#ytPlayer iframe');
    if(fr){
      const cmd=ytPlaying?'pauseVideo':'playVideo';
      try{
        fr.contentWindow?.postMessage(JSON.stringify({event:'command',func:cmd,args:''}),'*');
        ytPlaying=!ytPlaying;
        syncPlayerTransport();
      }catch(_){}
    }else{
      const a=A.find(x=>x.id===sel);
      const vids=a?ytVideos(a):[];
      if(vids.length)playYtVideo(vids[ytIdx]?.id||vids[0].id,ytIdx);
    }
    return;
  }
  if(mediaSource==='sc'&&widget&&widgetReady){
    widget.isPaused(p=>{
      if(p)widget.play();else widget.pause();
    });
    return;
  }
  const a=A.find(x=>x.id===sel);
  if(!a)return;
  const vids=ytVideos(a);
  if(listenTab==='yt'&&vids.length){
    playYtVideo(vids[ytIdx]?.id||vids[0].id,ytIdx);
  }else if(widgetReady&&sounds.length){
    playTrack(trackIdx>=0?trackIdx:firstPlayableIdx());
  }else if(vids.length){
    playYtVideo(vids[0].id,0);
  }
}

function navTrack(dir){
  const a=sel?A.find(x=>x.id===sel):null;
  const vids=a?ytVideos(a):[];
  if(mediaSource==='yt'||(mediaSource!=='sc'&&listenTab==='yt'&&vids.length)){
    if(!vids.length)return;
    const i=(ytIdx+dir+vids.length)%vids.length;
    playYtVideo(vids[i].id,i);
    return;
  }
  if(!widget||!widgetReady||!sounds.length)return;
  const n=sounds.length;
  let i=trackIdx;
  for(let step=0;step<n;step++){
    i=(i+(dir>=0?1:-1)+n)%n;
    if(trackPlayable(sounds[i])){
      playTrack(i);
      return;
    }
  }
}

function playTrack(i){
  if(!widget||!widgetReady||i<0)return;
  const s=sounds[i];
  if(!s||!trackPlayable(s))return;
  stopOtherMedia('sc');
  setListenTab('sc');
  mediaSource='sc';
  trackIdx=i;
  scNote='';
  renderTracks();
  const url=scTrackUrl(s);
  if(url){
    widget.load(url,{
      auto_play:true,
      callback:()=>{
        widget.getCurrentSoundIndex(idx=>{trackIdx=idx;renderTracks();updatePlayerMeta();});
      },
    });
  }else{
    widget.skip(i);
    setTimeout(()=>widget.play(),350);
  }
  syncPlayerTransport();
  document.getElementById('listenHub')?.scrollIntoView({behavior:'smooth',block:'nearest'});
}

// ── artist navigation ──────────────────────────────────────────
function navArtist(dir){
  const list=visibleArtists();
  if(!list.length)return;
  let i=selIndex();
  if(i<0)i=dir>0?-1:0;
  i=(i+dir+list.length)%list.length;
  const cont=mediaSource||(listenTab==='yt'||listenTab==='sc'?listenTab:null);
  pick(list[i].id,cont);
}

function markYtQueue(){
  document.querySelectorAll('.listen-panel[data-panel="yt"] .q-item').forEach((b,j)=>b.classList.toggle('on',j===ytIdx));

function playYtVideo(id,idx){

    syncPlayerTransport();
    return;
  }
  mount.innerHTML=ytPlayerHtml(id,true);
  syncPlayerTransport();

function mountYtPlayer(a){
  const vids=ytVideos(a);
  if(!vids.length)return;
  const v=vids[ytIdx]||vids[0];
  const mount=document.getElementById('ytPlayer');
  if(!mount)return;
  if(location.protocol==='file:'){
    mount.innerHTML=`<p class="listen-empty">Serve via <code>python3 -m http.server 8765</code> for embeds.</p>`;
  }else{
    mount.innerHTML=ytPlayerHtml(v.id,false);
  }
  markYtQueue();
}

function pick(id,continueMedia=null){
  pauseYouTube();
  pauseSoundCloud();
  sel=id;
  heroPhotoIdx=0;
  ytIdx=0;
  mediaSource=null;
  ytPlaying=false;
  playing=false;
  const a=A.find(x=>x.id===id);
  const vids=a?ytVideos(a):[];
  const hasSc=!!(a&&scEmbedUrl(a));
  if(continueMedia==='yt'&&vids.length)listenTab='yt';
  else if(continueMedia==='sc'&&hasSc)listenTab='sc';
  else listenTab=vids.length?'yt':hasSc?'sc':'yt';
  if(continueMedia==='yt'&&vids.length)pendingMediaAutoplay='yt';
  else if(continueMedia==='sc'&&hasSc)pendingMediaAutoplay='sc';
  else pendingMediaAutoplay=null;
  renderList();
  renderDetail();
  if(a)updatePlayerBar(a);
  if(isMobile()){
    syncMobilePane();
    requestAnimationFrame(()=>{
      document.getElementById('detail')?.scrollTo({top:0,behavior:'smooth'});
    });
  }
}

function updatePlayerBar(a){
  const c=col(a.stage);
  const url=photoUrl(a);
  const thumb=document.getElementById('playerThumb');
  if(url){
    thumb.className='pthumb-sm';
    thumb.innerHTML=`<img src="${url}" alt="" onerror="this.parentElement.className='pthumb-sm fallback';this.parentElement.style.color='${c}';this.parentElement.textContent='${ini(a.name)}'">`;
  }else{
    thumb.className='pthumb-sm fallback';
    thumb.style.color=c;
    thumb.textContent=ini(a.name);
  }
  document.getElementById('playerTitle').textContent=a.name;
  document.getElementById('playerSub').textContent=`${stn(a.stage)} · ${a.slot}`;
  const i=selIndex(), n=visibleArtists().length;
  document.getElementById('btnPrevA').disabled=n<=1;
  document.getElementById('btnNextA').disabled=n<=1;
  syncPlayerTransport();
}

function updatePlayerMeta(){
  const a=sel?A.find(x=>x.id===sel):null;
  if(a)updatePlayerBar(a);
}

function setHeroPhoto(i){
  heroPhotoIdx=i;
  const a=A.find(x=>x.id===sel);
  if(!a)return;
  const urls=[a.img,...((a.photos)||[])].filter(Boolean);
  const url=urls[i]||photoUrl(a);
  const el=document.getElementById('heroImg');
  if(!el)return;
  if(url){
    el.innerHTML=`<img src="${url}" alt="${a.name}" onerror="window.__imgFail&&__imgFail()">`;
  }
  document.querySelectorAll('.pthumb').forEach((t,j)=>t.classList.toggle('on',j===i));
}

window.__imgFail=function(){
  const a=A.find(x=>x.id===sel);
  if(!a)return;
  const el=document.getElementById('heroImg');
  const tried=(el.dataset.tried||'').split('|').filter(Boolean);
  const chain=[scPhotoFromCache(a),a.ig_h?`https://unavatar.io/instagram/${encodeURIComponent(a.ig_h)}`:'',scSlug(a)?`https://unavatar.io/soundcloud/${encodeURIComponent(scSlug(a))}`:''].filter(Boolean);
  const next=chain.find(u=>!tried.includes(u));
  if(next){
    tried.push(next);
    el.dataset.tried=tried.join('|');
    el.innerHTML=`<img src="${next}" alt="${a.name.replace(/"/g,'&quot;')}" onerror="window.__imgFail()">`;
    return;
  }
  const c=col(a.stage);
  el.innerHTML=`<div class="hero-img fallback" style="background:${c}15;color:${c}">${ini(a.name)}</div>`;
};

// ── render list ──────────────────────────────────────────────────

function storyChapterId(){
  return filt==='all'?null:filt;
}

function artistsOnStage(stageId){
  return A.filter(a=>a.stage===stageId);
}

function renderStoryCtx(){
  const el=document.getElementById('storyCtx');
  if(!el)return;
  const sid=storyChapterId();
  if(!sid){
    el.textContent='';
    el.style.color='';
  }else{
    const ch=STORY.chapters[sid];
    el.textContent=ch.tagline;
    el.style.color=col(sid);
  }
  requestAnimationFrame(updateTopChrome);
}

function ensureSelection(){
  const list=displayedArtists();
  if(sel&&list.some(a=>a.id===sel))return;
  sel=list.length?list[0].id:null;
}

function listGroupedByChapter(){
  return filt==='all'&&sortBy==='lineup'&&!qSearch&&!hasActiveRefine();
}

function renderArtistRow(a){
  const c=col(a.stage);
  const tags=[];
  if(a.warm)  tags.push('<span class="t tw">warm-up</span>');
  if(a.live)  tags.push('<span class="t tl">live</span>');
  if(a.hl)    tags.push('<span class="t th">headliner</span>');
  if(a.local) tags.push('<span class="t tn">NL local</span>');
  const pu=photoUrl(a);
  const scD=scCached(a);
  const sd=sortStatDisplay(a);
  const statLbl=SORT_LABELS[sortBy]||'';
  const statCol=sd?`<div class="ai-stat"><span class="ai-stat-val" style="color:${sd.c}">${sd.v}</span><span class="ai-stat-lbl">${statLbl}</span></div>`:'';
  const av=pu
    ?`<img class="av" src="${pu}" alt="" onerror="this.outerHTML='<div class=\\'av\\' style=\\'background:${c}15;color:${c}\\'>${ini(a.name)}</div>'">`
    :`<div class="av" style="background:${c}15;color:${c}">${ini(a.name)}</div>`;
  return `<div class="ai${a.id===sel?' on':''}" style="border-left-color:${c}" onclick="pick('${a.id}')">
    ${av}
    <div class="ai-info">
      <div class="ai-name">${a.name}${sortBy==='lineup'&&scD?.f?` <span style="font-size:9px;color:#ff5500;font-weight:400;font-family:'Space Mono',monospace">${fmt(scD.f)}</span>`:''}</div>
      <div class="ai-slot" style="color:${c}">${stn(a.stage)} · ${a.slot}</div>
      <div class="ai-tags">${tags.join('')}</div>
    </div>
    ${statCol}
  </div>`;
}

function listChapterHeader(stageId){
  const c=col(stageId);
  return `<div class="list-chapter" style="--ch-c:${c}"><div class="list-chapter-name">${stn(stageId)}</div></div>`;
}

function renderList(){
  const items=visibleArtists();
  const listEl=document.getElementById('list');
  if(!items.length){
    const hint=hasActiveRefine()||qSearch
      ?'<button type="button" class="chip-clear" style="margin-top:6px" onclick="clearRefine();setSearch(\'\');document.getElementById(\'qSearch\').value=\'\'">Clear filters</button>'
      :'';
    listEl.innerHTML=`<div class="empty">No artists match<br><span style="font-size:10px;color:var(--di)">Try another stage or search</span>${hint}</div>`;
    return;
  }
  if(listGroupedByChapter()){
    let html='';
    for(const sid of STAGE_ORDER){
      const stageItems=items.filter(a=>a.stage===sid);
      if(!stageItems.length)continue;
      html+=listChapterHeader(sid);
      html+=stageItems.map(renderArtistRow).join('');
    }
    listEl.innerHTML=html;
    return;
  }
  listEl.innerHTML=items.map(renderArtistRow).join('');
}

function renderTracks(){
  const el=document.getElementById('tracks');
  const note=document.getElementById('scNote');
  if(note)note.textContent=scNote||'';
  if(!el)return;
  if(!sounds.length){
    el.innerHTML=widgetReady?'<div class="trk-load">No public tracks in embed</div>':'';
    return;
  }
  el.innerHTML=sounds.map((s,i)=>{
    const ok=trackPlayable(s);
    const url=scTrackUrl(s);
    const ext=url?`<a class="trk-ext" href="${url}" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="Open on SoundCloud" aria-label="Open on SoundCloud"><span class="ico-ext" aria-hidden="true"></span></a>`:'';
    const pn=s?.playback_count??s?.play_count;
    const plays=pn?`<span class="q-item-m">${fmt(pn)}</span>`:'';
    return `<button type="button" class="q-item${i===trackIdx?' on':''}${ok?'':' off'}" onclick="playTrack(${i})">
      <span class="q-item-n">${s.title||'Track '+(i+1)}</span>
      ${plays}
      <span class="q-item-m">${fmtDur(s.duration)}</span>${ext}
    </button>`;
  }).join('');
}

function fmtDur(ms){
  if(!ms)return '';
  const sec=Math.round(ms/1000);
  const m=Math.floor(sec/60);
  const s=sec%60;
  return m+':'+String(s).padStart(2,'0');
}

// ── render detail ────────────────────────────────────────────────
function renderDetail(){
  const dp=document.getElementById('detail');
  if(!sel){
    pendingMediaAutoplay=null;
    dp.innerHTML='<div class="empty">Select an artist from the list</div>';
    syncMobilePane();
    return;
  }
  const a=A.find(x=>x.id===sel);
  if(!a)return;
  const c=col(a.stage);

  const tags=[];
  if(a.warm)  tags.push('<span class="t tw">warm-up</span>');
  if(a.live)  tags.push('<span class="t tl">live set</span>');
  if(a.hl)    tags.push('<span class="t th">poster headliner</span>');
  if(a.local) tags.push('<span class="t tn">NL local</span>');

  const mainPhoto=photoUrl(a);
  const extra=[...(a.photos||[])];
  const thumbs=[a.img,...extra].filter(Boolean);
  const strip=thumbs.length>1?`<div class="photo-strip">${thumbs.map((u,i)=>`<img class="pthumb${i===heroPhotoIdx?' on':''}" src="${u}" alt="" onclick="setHeroPhoto(${i})">`).join('')}</div>`:'';

  const heroInner=mainPhoto
    ?`<img src="${mainPhoto}" alt="${a.name}" onerror="window.__imgFail()">`
    :`<div class="hero-img fallback" style="background:${c}15;color:${c}">${ini(a.name)}</div>`;

  const metrics=`
    <div class="ai-stat"><span class="ai-stat-val" style="color:${c}">${fmt(a.ra)}</span><span class="ai-stat-lbl">RA</span></div>
    <div class="ai-stat"><span class="ai-stat-val" style="color:${c}">${fmt(a.ig)}</span><span class="ai-stat-lbl">IG</span></div>`;

  const mobileBack=isMobile()?`<button type="button" class="mobile-back" onclick="mobileBackToList()"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14.5 6.5 9 12l5.5 5.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg><span>Lineup</span></button>`:'';

  dp.innerHTML=`${mobileBack}
    <div class="detail-head" style="--stage-accent:${c}">
      <div class="detail-av-col">
        <div class="detail-av" id="heroImg">${heroInner}</div>
        ${strip}
      </div>
      <div class="detail-body">
        <h1 class="detail-name">${a.name}</h1>
        <p class="detail-origin">${a.origin}</p>
        <div class="detail-row">
          <span class="detail-pill" style="background:${c};color:#080808">${stn(a.stage)} · ${a.slot}</span>
          ${tags.length?`<div class="ai-tags">${tags.join('')}</div>`:''}
        </div>
      </div>
      <div class="detail-metrics">${metrics}</div>
    </div>

    <div class="genres">${a.genres.map(g=>{
      const on=exactGenreFilt&&exactGenreFilt.toLowerCase()===g.toLowerCase();
      return `<button type="button" class="gc${on?' on':''}" onclick="filterByGenre('${jsAttrStr(g)}')">${g}</button>`;
    }).join('')}</div>

    ${listenHubHtml(a,c)}

    ${scHeroHtml(a)}

    <div class="detail-grid">
      <div class="detail-card">
        <div class="sec">Artist</div>
        <div class="bio">${a.bio}</div>
      </div>
      <div class="detail-card">
        <div class="sec">Links</div>
        <div class="links">${a.links.map(l=>`
      <a class="lk" href="${l.u}" target="_blank" rel="noopener">
        <span class="lk-ico">${l.p}</span>
        <div class="lk-t"><div class="lk-label">${l.l}</div><div class="lk-sub">${l.s}</div></div>
        <span class="lk-arr"><span class="ico-ext" aria-hidden="true"></span></span>
      </a>`).join('')}
        </div>
      </div>
    </div>

  `;
  bindWidget();
  mountYtPlayer(a);
  if(pendingMediaAutoplay==='yt'){
    const vids=ytVideos(a);
    if(vids.length){
      const v=vids[ytIdx]||vids[0];
      playYtVideo(v.id,ytIdx);
    }else pendingMediaAutoplay=null;
  }
  syncPlayerTransport();
}

window.playYtVideo=playYtVideo;

function go(s,btn){
  filt=s;
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  syncUrlState();
  applyListControls();
  if(isMobile())mobileBackToList();
}

document.addEventListener('click',()=>closePanels());
document.getElementById('sortMenu')?.addEventListener('click',e=>e.stopPropagation());
document.getElementById('refinePanel')?.addEventListener('click',e=>e.stopPropagation());

document.addEventListener('keydown',e=>{
  if(e.key==='/'||e.key==='f'){
    if(!e.target.matches('input,textarea')){
      e.preventDefault();
      const inp=document.getElementById('qSearch');
      inp?.focus();
      inp?.select();
    }
    return;
  }
  if(e.target.matches('input,textarea'))return;
  if(e.key==='Escape'){
    if(isMobile()&&document.getElementById('layout')?.classList.contains('mobile-detail')){
      mobileBackToList();
      return;
    }
    closePanels();
    return;
  }
  if(e.key==='ArrowRight'){e.preventDefault();navArtist(1);}
  if(e.key==='ArrowLeft'){e.preventDefault();navArtist(-1);}
  if(e.key===' '){e.preventDefault();togglePlay();}
});

window.addEventListener('resize',()=>{
  requestAnimationFrame(()=>{
    updateTopChrome();
    syncMobilePane();
  });
});

// boot
buildGenreSelect();
readUrlState();
refreshSortUI();
applyListControls();
initMobileSplit();
</script>

<!-- Node-only: refresh RA counts in this file (not executed in the browser). -->
<script type="text/plain" id="fetchRaUtil">
// FETCH_RA_START — run: sed -n '/FETCH_RA_START/,/FETCH_RA_END/p' crave-2026-explorer.html | sed '1d;$d' > _fetch-ra.js && node _fetch-ra.js
#!/usr/bin/env node
const fs = require('fs');
const path = require('path');
const HTML = path.join(__dirname, 'crave-2026-explorer.html');
const QUERY = 'query($slug:String!){artist(slug:$slug){name followerCount}}';
const EXTRA = { fredky: ['setaocmass'], chlstr: ['stranger-nl'] };
const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
async function fetchRa(slug) {
  const res = await fetch('https://ra.co/graphql', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'User-Agent': 'Crave2026Explorer/1.0 (local refresh script)' },
    body: JSON.stringify({ query: QUERY, variables: { slug } }),
  });
  const json = await res.json();
  const a = json.data?.artist;
  if (!a) return null;
  return { name: a.name, count: a.followerCount };
}
function raSlugFromBlock(block) {
  const m = block.match(/ra\.co\/dj\/([^/'"\s]+)/);
  return m ? m[1] : null;
}
function patchArtist(block, count, note) {
  let out = block.replace(/\bra:\d+,/, `ra:${count},`);
  out = out.replace(/\bra_c:(?:true|false),/, 'ra_c:true,');
  const safe = note.replace(/'/g, "\\'");
  if (/\bra_n:'/.test(out)) {
    out = out.replace(/\bra_n:'(?:\\.|[^'])*',/g, '').replace(/\bra_c:true,/, `ra_c:true, ra_n:'${safe}',`);
  } else {
    out = out.replace(/\bra_c:true,/, `ra_c:true, ra_n:'${safe}',`);
  }
  return out;
}
async function main() {
  let html = fs.readFileSync(HTML, 'utf8');
  const blocks = [...html.matchAll(/\{id:'[^']+',[\s\S]*?\n \]\},/g)].map((m) => m[0]);
  const updates = [];
  for (const block of blocks) {
    const idM = block.match(/\{id:'([^']+)'/);
    if (!idM) continue;
    const id = idM[1];
    const slug = raSlugFromBlock(block);
    if (!slug) { console.warn(`skip ${id}: no ra.co/dj link`); continue; }
    const parts = [slug, ...(EXTRA[id] || [])];
    let total = 0;
    const names = [];
    for (const s of parts) {
      const info = await fetchRa(s);
      await sleep(150);
      if (!info) { console.warn(`  ${id}: slug "${s}" not found`); continue; }
      total += info.count;
      names.push(`${info.name} (${info.count.toLocaleString()})`);
    }
    if (!total) { console.warn(`skip ${id}: no counts`); continue; }
    const note = parts.length > 1
      ? `Confirmed combined RA followers: ${names.join(' + ')}.`
      : `Confirmed via ra.co (${names[0]}).`;
    updates.push({ id, total, note, slug });
    console.log(`${id.padEnd(8)} ${String(total).padStart(6)}  ${slug}${parts.length > 1 ? ' +' + EXTRA[id].join('+') : ''}`);
  }
  for (const { id, total, note } of updates) {
    const re = new RegExp(`\\{id:'${id}',[\\s\\S]*?\\n \\]\\},`);
    const m = html.match(re);
    if (!m) { console.warn(`block not found for ${id}`); continue; }
    html = html.replace(m[0], patchArtist(m[0], total, note));
  }
  html = html.replace(/bars\(a\.ra,15000/g, 'bars(a.ra,35000');
  fs.writeFileSync(HTML, html);
  console.log(`\nUpdated ${updates.length} artists in ${HTML}`);
}
main().catch((e) => { console.error(e); process.exit(1); });
// FETCH_RA_END
</script>
